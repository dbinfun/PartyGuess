<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>抢答系统</title>
    <style>
      :root {
        --bg-primary: #f5f5f7;
        --bg-secondary: #ffffff;
        --bg-tertiary: #e8e8ed;
        --text-primary: #1d1d1f;
        --text-secondary: #86868b;
        --text-tertiary: #aeaeb2;
        --accent: #0071e3;
        --accent-hover: #0077ed;
        --accent-dim: rgba(0,113,227,0.12);
        --danger: #ff3b30;
        --danger-hover: #e0352b;
        --success: #34c759;
        --warning: #ff9500;
        --border: rgba(0,0,0,0.08);
        --border-strong: rgba(0,0,0,0.14);
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
        --glass-bg: rgba(255,255,255,0.72);
        --glass-bg-strong: rgba(255,255,255,0.88);
        --glass-border: rgba(0,0,0,0.08);
        --radius-sm: 12px;
        --radius-md: 18px;
        --radius-lg: 24px;
        --radius-xl: 32px;
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        --font-mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
        --transition: 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      }

      [data-theme="dark"] {
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-tertiary: #6e6e73;
        --accent: #2997ff;
        --accent-hover: #40a9ff;
        --accent-dim: rgba(41,151,255,0.18);
        --danger: #ff453a;
        --danger-hover: #e03a30;
        --success: #30d158;
        --warning: #ff9f0a;
        --border: rgba(255,255,255,0.10);
        --border-strong: rgba(255,255,255,0.18);
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
        --glass-bg: rgba(44,44,46,0.72);
        --glass-bg-strong: rgba(44,44,46,0.92);
        --glass-border: rgba(255,255,255,0.10);
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--font-stack);
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background var(--transition), color var(--transition);
      }

      button {
        font-family: var(--font-stack);
        cursor: pointer;
        transition: all var(--transition);
      }

      input {
        font-family: var(--font-stack);
        transition: all var(--transition);
      }

      ::selection { background: var(--accent); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
